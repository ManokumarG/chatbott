<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>TechLeaf ChatBot</title>
    <style>
      :root {
        --bg-sidebar: #000000;
        --bg-main: #212121;
        --bg-input: #2f2f2f;
        --text-main: #ececec;
        --text-sidebar: #c5c5c5;
        --border-color: #424242;
        --hover-color: #2a2a2a;
        --user-msg-bg: #2f2f2f;
        --font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-main);
        color: var(--text-main);
        font-family: var(--font-family);
        display: flex;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      /* Sidebar */
      #sidebar {
        width: 260px;
        background-color: var(--bg-sidebar);
        display: flex;
        flex-direction: column;
        padding: 10px;
        border-right: 1px solid var(--border-color);
        transition: transform 0.3s ease;
        z-index: 1000;
      }

      .sidebar-logo {
        font-weight: 600;
        font-size: 18px;
        padding: 10px;
      }

      #new-chat-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        border: 1px solid var(--border-color);
        margin: 10px 0;
      }

      #recent-chats {
        flex-grow: 1;
        overflow-y: auto;
        font-size: 13px;
      }

      .recent-chat-item {
        padding: 8px;
        border-radius: 5px;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-sidebar);
      }

      .recent-chat-item:hover {
        background: var(--hover-color);
      }

      /* Main Chat */
      #main-chat {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        position: relative;
        width: 100%;
        min-width: 0; /* Prevents flex items from overflowing */
      }

      /* TechLeaf Background Branding */
      #chat-bg-brand {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 8vw;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.03); /* Very subtle watermark */
        pointer-events: none;
        user-select: none;
        z-index: 0;
        white-space: nowrap;
      }

      #chat-box {
        flex-grow: 1;
        overflow-y: auto;
        padding: 60px 15% 150px 15%;
        display: flex;
        flex-direction: column;
        z-index: 1;
      }

      .message {
        margin-bottom: 24px;
        line-height: 1.6;
        max-width: 85%;
        word-wrap: break-word;
      }

      .message.user {
        align-self: flex-end;
        background-color: var(--user-msg-bg);
        padding: 12px 18px;
        border-radius: 18px;
      }

      .message.bot {
        align-self: flex-start;
      }

      /* Input Area */
      #input-container {
        position: absolute;
        bottom: 30px;
        left: 15%;
        right: 15%;
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: 14px;
        display: flex;
        padding: 8px 12px;
        align-items: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        z-index: 10;
      }

      #user-input {
        flex-grow: 1;
        background: none;
        border: none;
        color: white;
        padding: 10px;
        outline: none;
        font-size: 16px; /* Prevents iOS zoom on focus */
      }

      .send-btn {
        background: #fff;
        color: #000;
        border: none;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        cursor: pointer;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      /* ---------------- RESPONSIVE DESIGN ---------------- */

      /* Tablets & Small Laptops */
      @media (max-width: 1024px) {
        #chat-box {
          padding: 60px 10% 150px 10%;
        }
        #input-container {
          left: 10%;
          right: 10%;
        }
      }

      /* Mobile Devices */
      @media (max-width: 768px) {
        #sidebar {
          position: absolute;
          left: -260px;
          height: 100%;
        }

        #sidebar.active {
          transform: translateX(260px);
        }

        #chat-box {
          padding: 60px 20px 140px 20px;
        }

        #input-container {
          left: 15px;
          right: 15px;
          bottom: 20px;
        }

        #chat-bg-brand {
          font-size: 15vw;
        }

        .message {
          max-width: 90%;
          font-size: 15px;
        }
      }

      /* Small Phones */
      @media (max-width: 480px) {
        #user-input {
          font-size: 14px;
        }

        .sidebar-logo {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <div class="sidebar-logo">TechLeaf</div>
      <div id="new-chat-btn"><span>+</span> New Chat</div>
      <div id="recent-chats">
        <div
          style="
            color: gray;
            font-size: 11px;
            margin-bottom: 5px;
            padding-left: 10px;
          "
        >
          RECENT
        </div>
        <div class="recent-chat-item">Welcome Message</div>
      </div>
    </div>

    <div id="main-chat">
      <div id="chat-bg-brand">TechLeaf</div>

      <div id="chat-box">
        <div class="message bot">
          <h1
            style="
              text-align: center;
              margin-top: 15vh;
              font-weight: 500;
              font-size: 2rem;
            "
          >
            Where should we begin?
          </h1>
        </div>
      </div>

      <div id="input-container">
        <input
          type="text"
          id="user-input"
          placeholder="Ask TechLeaf anything..."
          autocomplete="off"
        />
        <button class="send-btn" onclick="sendMessage()">↑</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
