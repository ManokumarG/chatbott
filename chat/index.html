<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechLeaf ChatBot</title>
    <style>
      :root {
        --bg-sidebar: #000000;
        --bg-main: #212121;
        --bg-input: #2f2f2f;
        --text-main: #ececec;
        --text-sidebar: #c5c5c5;
        --border-color: #424242;
        --hover-color: #2a2a2a;
        --user-msg-bg: #2f2f2f;
        --font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-main);
        color: var(--text-main);
        font-family: var(--font-family);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* Sidebar */
      #sidebar {
        width: 260px;
        background-color: var(--bg-sidebar);
        display: flex;
        flex-direction: column;
        padding: 10px;
        border-right: 1px solid var(--border-color);
      }

      .sidebar-logo {
        font-weight: 600;
        font-size: 18px;
        padding: 10px;
      }

      #new-chat-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        border: 1px solid var(--border-color);
        margin: 10px 0;
      }

      #recent-chats {
        flex-grow: 1;
        overflow-y: auto;
        font-size: 13px;
      }
      .recent-chat-item {
        padding: 8px;
        border-radius: 5px;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-sidebar);
      }
      .recent-chat-item:hover {
        background: var(--hover-color);
      }

      /* Main Chat */
      #main-chat {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      #chat-box {
        flex-grow: 1;
        overflow-y: auto;
        padding: 40px 15% 120px 15%;
        display: flex;
        flex-direction: column;
      }

      .message {
        margin-bottom: 20px;
        line-height: 1.6;
        max-width: 85%;
      }
      .message.user {
        align-self: flex-end;
        background-color: var(--user-msg-bg);
        padding: 10px 18px;
        border-radius: 15px;
      }
      .message.bot {
        align-self: flex-start;
      }

      /* Input */
      #input-container {
        position: absolute;
        bottom: 30px;
        left: 15%;
        right: 15%;
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        display: flex;
        padding: 8px 15px;
        align-items: center;
      }

      #user-input {
        flex-grow: 1;
        background: none;
        border: none;
        color: white;
        padding: 10px;
        outline: none;
        font-size: 15px;
      }

      .send-btn {
        background: #fff;
        color: #000;
        border: none;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        cursor: pointer;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <div class="sidebar-logo">TechLeaf</div>
      <div id="new-chat-btn"><span>+</span> New Chat</div>
      <div id="recent-chats">
        <div style="color: gray; font-size: 11px; margin-bottom: 5px">
          RECENT
        </div>
        <div class="recent-chat-item">Welcome Message</div>
      </div>
    </div>

    <div id="main-chat">
      <div id="chat-box">
        <div class="message bot">
          <h1 style="text-align: center; margin-top: 20vh">
            Where should we begin?
          </h1>
        </div>
      </div>

      <div id="input-container">
        <input
          type="text"
          id="user-input"
          placeholder="Ask TechLeaf anything..."
          autocomplete="off"
        />
        <button class="send-btn" onclick="sendMessage()">↑</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
